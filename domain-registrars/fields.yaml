field_categories:
  basic_info:
    - name: name
      description: Registrar name
      detail_level: brief
    - name: parent_company
      description: Owning company; recent ownership changes flagged
      detail_level: brief
    - name: year_founded
      description: Year founded
      detail_level: brief
    - name: icann_accreditation
      description: Whether ICANN accredited directly
      detail_level: brief

  pricing:
    - name: com_first_year_price
      description: Current .com first-year registration price (USD, snapshot date noted)
      detail_level: moderate
    - name: com_renewal_price
      description: Current .com annual renewal price (USD)
      detail_level: moderate
    - name: five_year_total_cost_of_ownership
      description: First year + 4 renewals + any privacy/fees; the decisive
        metric for a long-held personal domain
      detail_level: detailed
    - name: transfer_price
      description: Cost to transfer a .com in (usually includes 1-year extension)
      detail_level: brief
    - name: pricing_model_transparency
      description: Wholesale-passthrough vs flat-margin vs promo-driven; predicts
        future price stability
      detail_level: moderate
    - name: hidden_fees_upsells
      description: Checkout upsells, redemption/grace-period fees, forced add-ons
      detail_level: moderate
    - name: auto_renew_and_refund_policy
      description: Auto-renewal defaults, refund window, expiry/redemption fees
      detail_level: moderate

  privacy_security:
    - name: free_whois_privacy
      description: WHOIS privacy included free on all domains
      detail_level: brief
    - name: two_fa_support
      description: 2FA methods supported (TOTP, hardware keys)
      detail_level: brief
    - name: domain_lock
      description: Registrar/transfer lock support
      detail_level: brief
    - name: dnssec
      description: DNSSEC support and ease of enabling
      detail_level: brief
    - name: account_security_incident_history
      description: Breaches or hijacking incidents (e.g. Squarespace July 2024)
      detail_level: moderate

  dns_reliability:
    - name: free_dns_quality
      description: Quality/anycast footprint of included DNS hosting
      detail_level: moderate
    - name: cname_flattening_alias_at_apex
      description: Whether free DNS supports CNAME/ALIAS/ANAME at zone apex, so
        calebpollreis.com can follow GitHub's hostname instead of pinned A records
      detail_level: detailed
    - name: nameserver_flexibility
      description: Can you use third-party DNS, or are you locked to the
        registrar's nameservers (e.g. Cloudflare Registrar requires Cloudflare NS)
      detail_level: moderate
    - name: uptime_reputation
      description: DNS/panel uptime track record
      detail_level: brief
    - name: propagation_speed
      description: Typical DNS change propagation experience
      detail_level: brief

  github_pages_setup:
    - name: apex_domain_support
      description: Ease of adding the four GitHub Pages A records (or apex ALIAS)
        for calebpollreis.com
      detail_level: detailed
    - name: www_cname_ease
      description: Ease of adding www CNAME to CPollreis.github.io
      detail_level: moderate
    - name: https_enforcement_compatibility
      description: Compatibility with GitHub Pages' Let's Encrypt HTTPS
        (proxy/CDN interactions, e.g. Cloudflare proxy mode caveats)
      detail_level: detailed
    - name: documented_github_pages_guides
      description: Registrar-specific or community guides for GitHub Pages setup
      detail_level: brief

  usability:
    - name: dashboard_ux
      description: Control panel clarity and ad noise
      detail_level: brief
    - name: ease_of_dns_config
      description: How quickly a newcomer can add/edit records correctly
      detail_level: moderate
    - name: api_and_automation_support
      description: Registrar API quality and Terraform/IaC support for DNS-as-code
      detail_level: moderate
    - name: free_email_forwarding
      description: Free catch-all/alias forwarding (hello@calebpollreis.com)
      detail_level: moderate

  support_trust:
    - name: support_channels
      description: Chat/ticket/phone availability and responsiveness
      detail_level: brief
    - name: community_reputation
      description: Sentiment in developer communities over the last 12 months
      detail_level: moderate
    - name: transfer_out_friction
      description: Ease of leaving; auth-code access, lock policies
      detail_level: moderate
    - name: transfer_lock_policy_current
      description: Applicable transfer-lock rule under the ICANN 60-day to 30-day
        transition rolling out ~2026
      detail_level: brief
    - name: acquisition_ownership_risk
      description: Recent ownership changes and their price/service impact
        (Google Domains->Squarespace, Gandi sale)
      detail_level: moderate

uncertain: []
